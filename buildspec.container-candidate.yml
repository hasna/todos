version: 0.2

env:
  shell: bash

phases:
  pre_build:
    commands:
      - set -euo pipefail
      - test -n "${IMAGE_TAG:-}"
      - test -n "${SOURCE_SHA:-}"
      - test -n "${EXPECTED_SOURCE_TREE_SHA256:-}"
      - test -n "${AWS_REGION:-}"
      - test -n "${ECR_REPOSITORY:-}"
      - test -n "${ECR_REPOSITORY_NAME:-}"
      - test -n "${BASE_IMAGE_ARCHIVE_BUCKET:-}"
      - test -n "${BASE_IMAGE_ARCHIVE_KEY:-}"
      - test -n "${BASE_IMAGE_ARCHIVE_VERSION:-}"
      - test -n "${BASE_IMAGE_ARCHIVE_SHA256:-}"
      - test -n "${BASE_IMAGE_SOURCE_REF:-}"
      - export REPOSITORY="${ECR_REPOSITORY}"
      - export IMAGE="${REPOSITORY}:${IMAGE_TAG}"
      - export BASE_IMAGE_SOURCE_TAG="${BASE_IMAGE_SOURCE_REF}"
      - export BUN_IMAGE_OVERRIDE='todos-base-local:1.3.14-alpine-arm64-3c9ab1a5'
      - export TODOS_PACKAGE_VERSION="$(jq -er '.version | strings' package.json)"
      - LC_ALL=C find . -type f -print0 | LC_ALL=C sort -z | xargs -0 sha256sum --zero > /tmp/source-tree.manifest
      - export SOURCE_TREE_SHA256=$(sha256sum /tmp/source-tree.manifest | cut -d ' ' -f 1)
      - test "${SOURCE_TREE_SHA256}" = "${EXPECTED_SOURCE_TREE_SHA256}"
      - aws s3api get-object --bucket "${BASE_IMAGE_ARCHIVE_BUCKET}" --key "${BASE_IMAGE_ARCHIVE_KEY}" --version-id "${BASE_IMAGE_ARCHIVE_VERSION}" /tmp/bun-base.docker.tar > /tmp/bun-base-object.json
      - test "$(jq -r '.VersionId' /tmp/bun-base-object.json)" = "${BASE_IMAGE_ARCHIVE_VERSION}"
      - test "$(jq -r '.Metadata["archive-sha256"]' /tmp/bun-base-object.json)" = "${BASE_IMAGE_ARCHIVE_SHA256}"
      - test "$(jq -r '.Metadata["source-manifest-digest"]' /tmp/bun-base-object.json)" = 'sha256:3c9ab1a521c82144dff537125695017a0480d3a13088fba7e012cfae0f63146f'
      - echo "${BASE_IMAGE_ARCHIVE_SHA256}  /tmp/bun-base.docker.tar" | sha256sum -c -
      - docker load --input /tmp/bun-base.docker.tar | tee /tmp/bun-base-load.txt
      - grep -Fq "${BASE_IMAGE_SOURCE_TAG}" /tmp/bun-base-load.txt
      - test "$(docker image inspect "${BASE_IMAGE_SOURCE_TAG}" --format '{{.Id}}')" = 'sha256:bb03dc9f0724a6decf34994aac876876d1ab5e07c72371a4ed7a8466944617b2'
      - test "$(docker image inspect "${BASE_IMAGE_SOURCE_TAG}" --format '{{.Architecture}}/{{.Os}}')" = 'arm64/linux'
      - test "$(docker image inspect "${BASE_IMAGE_SOURCE_TAG}" --format '{{json .RootFS.Layers}}' | jq -r 'join(" ")')" = 'sha256:eeaa73608b53c6a3dab2c5a85c971d005a4bddb14082a9b5c1d363c4847972ee sha256:7d3c7c527364ea05826bbb239b0cb453683110194b5245ba029766e2ee92cc15 sha256:cfcc5c8f69603368ccd82a9b2a30fccb2aae75b08fc676d3728cafd6923817b5 sha256:ebed7195bea44dd34eccff80ecdebbc04a41a10ea15e4ba4b7190d4aa233fe13 sha256:75d568253f3e4e7c2ebf1406400b54b90968fa714ea835a9e1d564d61dda5c88 sha256:0691afbfc03f725433b1ac2baca3d30499e3008cb160f9b2e3b75a75943213d7'
      - docker tag "${BASE_IMAGE_SOURCE_TAG}" "${BUN_IMAGE_OVERRIDE}"
      - test "$(docker image inspect "${BUN_IMAGE_OVERRIDE}" --format '{{.Id}}')" = 'sha256:bb03dc9f0724a6decf34994aac876876d1ab5e07c72371a4ed7a8466944617b2'
      - docker run --rm -v "$PWD/scripts/semver.ts:/tmp/semver.ts:ro" --entrypoint bun "${BUN_IMAGE_OVERRIDE}" /tmp/semver.ts "${TODOS_PACKAGE_VERSION}"
      - aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${REPOSITORY%%/*}"
      - export SYFT_VERSION=1.46.0
      - curl -fsSL -o /tmp/syft.tar.gz "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_arm64.tar.gz"
      - echo '9fafef4db4f032ce81008d3a1529985d41ceb6ccdf2b388c9ce2f1ed7d32082e  /tmp/syft.tar.gz' | sha256sum -c -
      - tar -xzf /tmp/syft.tar.gz -C /tmp syft
      - export GRYPE_VERSION=0.115.0
      - curl -fsSL -o /tmp/grype.tar.gz "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/grype_${GRYPE_VERSION}_linux_arm64.tar.gz"
      - echo 'b8541b9ecc3e936e7db4ff14b71a9474b25f3898ccaad63ee0bfe3449fcd734d  /tmp/grype.tar.gz' | sha256sum -c -
      - tar -xzf /tmp/grype.tar.gz -C /tmp grype
      - export ORAS_VERSION=1.3.3
      - curl -fsSL -o /tmp/oras.tar.gz "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_arm64.tar.gz"
      - echo 'ac7156f93a21e903f7ad606c792f3560f17e0cd0e36365634701b1e7cc4e4eca  /tmp/oras.tar.gz' | sha256sum -c -
      - tar -xzf /tmp/oras.tar.gz -C /tmp oras
  build:
    commands:
      - set -euo pipefail
      - docker build --platform linux/arm64 --build-arg "BUN_IMAGE=${BUN_IMAGE_OVERRIDE}" --label "org.opencontainers.image.source=https://github.com/hasna/todos" --label "org.opencontainers.image.revision=${SOURCE_SHA}" --label "org.opencontainers.image.version=${TODOS_PACKAGE_VERSION}" -t "${IMAGE}" .
      - test "$(docker image inspect "${IMAGE}" --format '{{.Architecture}}')" = arm64
      - test "$(docker run --rm --entrypoint bun "${IMAGE}" --version)" = 1.3.14
      - test "$(docker run --rm --entrypoint bun "${IMAGE}" dist/server/index.js --version)" = "${TODOS_PACKAGE_VERSION}"
      - docker run --rm --entrypoint sh "${IMAGE}" -ec 'apk info -e musl; apk info -vv | grep -q "^libcrypto3-3.5.7-r0 - "; apk info -vv | grep -q "^libssl3-3.5.7-r0 - "; test -x /lib/ld-musl-aarch64.so.1; test ! -e /lib/ld-linux-aarch64.so.1; test ! -e /lib64/ld-linux-aarch64.so.1; apk info -e bash; ! apk info -e glibc; ! apk info -e perl; ! apk info -e sqlite-libs; ! apk info -e openssl; ! command -v openssl; ! command -v git; ! command -v tmux'
      - docker run --rm --entrypoint sh "${IMAGE}" -ec 'test -f /app/bin/contracts-cli.js; test ! -e /app/node_modules; test ! -e /app/package.json; test ! -e /app/bun.lock; ! find /app -type f \( -name package.json -o -name bun.lock -o -name bun.lockb \) -print -quit | grep -q .'
      - docker run --rm --entrypoint sh "${IMAGE}" -c 'apk info -vv | sort' > container-apk-inventory.txt
      - docker image inspect "${IMAGE}" > container-oci-inspect.json
      - /tmp/syft "${IMAGE}" -o cyclonedx-json=container-sbom.cdx.json
      - GRYPE_CHECK_FOR_APP_UPDATE=false /tmp/grype "${IMAGE}" --fail-on high -o json > container-vulnerability-report.json
      - GRYPE_CHECK_FOR_APP_UPDATE=false /tmp/grype db status -o json > container-grype-db-status.json
      - test "$(jq -r '.[0].Config.Cmd | join(" ")' container-oci-inspect.json)" = 'bun dist/server/index.js'
      - set +e; docker run --rm "${IMAGE}" bun dist/server/index.js migrate > /tmp/migrate-no-dsn.log 2>&1; rc=$?; set -e; test "$rc" -eq 2; grep -q 'no database URL' /tmp/migrate-no-dsn.log
      - export TEST_NETWORK="todos-candidate-${CODEBUILD_BUILD_NUMBER}"
      - export TEST_DB="todos-postgres-${CODEBUILD_BUILD_NUMBER}"
      - export TEST_APP="todos-app-${CODEBUILD_BUILD_NUMBER}"
      - export DB_CREDENTIAL=$(openssl rand -hex 24)
      - export POSTGRES_PASSWORD=${DB_CREDENTIAL}
      - docker network create "${TEST_NETWORK}"
      - mkdir -p /tmp/todos-tls
      - openssl req -x509 -newkey rsa:2048 -nodes -days 1 -subj /CN=todos-test-ca -keyout /tmp/todos-tls/ca.key -out /tmp/todos-tls/ca.crt >/dev/null 2>&1
      - openssl req -newkey rsa:2048 -nodes -subj /CN=todos-postgres -addext subjectAltName=DNS:todos-postgres -keyout /tmp/todos-tls/server.key -out /tmp/todos-tls/server.csr >/dev/null 2>&1
      - openssl x509 -req -days 1 -in /tmp/todos-tls/server.csr -CA /tmp/todos-tls/ca.crt -CAkey /tmp/todos-tls/ca.key -CAcreateserial -copy_extensions copy -out /tmp/todos-tls/server.crt >/dev/null 2>&1
      - openssl req -x509 -newkey rsa:2048 -nodes -days 1 -subj /CN=wrong-ca -keyout /tmp/todos-tls/wrong-ca.key -out /tmp/todos-tls/wrong-ca.crt >/dev/null 2>&1
      - chown 70:70 /tmp/todos-tls/server.key /tmp/todos-tls/server.crt /tmp/todos-tls/ca.crt
      - chmod 600 /tmp/todos-tls/server.key
      - docker run -d --name "${TEST_DB}" --network "${TEST_NETWORK}" --network-alias todos-postgres --network-alias wrong-postgres -e POSTGRES_USER=todos --env POSTGRES_PASSWORD -e POSTGRES_DB=todos -v /tmp/todos-tls:/tls:ro public.ecr.aws/docker/library/postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777 postgres -c ssl=on -c ssl_cert_file=/tls/server.crt -c ssl_key_file=/tls/server.key -c ssl_ca_file=/tls/ca.crt
      - for i in $(seq 1 60); do docker exec "${TEST_DB}" pg_isready -U todos >/dev/null 2>&1 && break; sleep 1; done; docker exec "${TEST_DB}" pg_isready -U todos
      - export TEST_DSN="postgres://todos:${DB_CREDENTIAL}@todos-postgres:5432/todos?sslmode=verify-full"
      - export SIGNING_MATERIAL=$(head -c 48 /dev/urandom | base64 | tr -d '\n')
      - docker run --rm --network "${TEST_NETWORK}" -e HASNA_TODOS_DATABASE_URL="${TEST_DSN}" -e PGSSLROOTCERT=/tls/ca.crt -e NODE_EXTRA_CA_CERTS=/tls/ca.crt -v /tmp/todos-tls:/tls:ro "${IMAGE}" bun dist/server/index.js migrate
      - >-
        docker run --rm --network "${TEST_NETWORK}" -e DATABASE_URL="${TEST_DSN}"
        -e PGSSLROOTCERT=/tls/ca.crt -e NODE_EXTRA_CA_CERTS=/tls/ca.crt -v /tmp/todos-tls:/tls:ro --entrypoint bun "${IMAGE}"
        -e 'const s=new Bun.SQL(process.env.DATABASE_URL); await s`select 1`; await s.end(); console.log("TLS verify-full positive: PASS")'
      - set +e; docker run --rm --network "${TEST_NETWORK}" -e DATABASE_URL="${TEST_DSN}" -e PGSSLROOTCERT=/tls/wrong-ca.crt -e NODE_EXTRA_CA_CERTS=/tls/wrong-ca.crt -v /tmp/todos-tls:/tls:ro --entrypoint bun "${IMAGE}" -e 'const s=new Bun.SQL(process.env.DATABASE_URL); await s`select 1`' >/tmp/wrong-ca.log 2>&1; wrong_ca_rc=$?; set -e; test "$wrong_ca_rc" -ne 0
      - set +e; docker run --rm --network "${TEST_NETWORK}" -e DATABASE_URL="postgres://todos:${DB_CREDENTIAL}@wrong-postgres:5432/todos?sslmode=verify-full" -e PGSSLROOTCERT=/tls/ca.crt -e NODE_EXTRA_CA_CERTS=/tls/ca.crt -v /tmp/todos-tls:/tls:ro --entrypoint bun "${IMAGE}" -e 'const s=new Bun.SQL(process.env.DATABASE_URL); await s`select 1`' >/tmp/wrong-host.log 2>&1; wrong_host_rc=$?; set -e; test "$wrong_host_rc" -ne 0
      - set +x
      - KEY_JSON=$(docker run --rm --network "${TEST_NETWORK}" -e HASNA_TODOS_DATABASE_URL="${TEST_DSN}" -e HASNA_TODOS_API_SIGNING_KEY="${SIGNING_MATERIAL}" -e PGSSLROOTCERT=/tls/ca.crt -e NODE_EXTRA_CA_CERTS=/tls/ca.crt -v /tmp/todos-tls:/tls:ro --entrypoint bun "${IMAGE}" bin/contracts-cli.js issue-key --app todos --scopes 'todos:*' --no-expiry --json)
      - export TODOS_V1_TOKEN=$(printf '%s' "$KEY_JSON" | jq -r '.token')
      - test -n "${TODOS_V1_TOKEN}"; test "${TODOS_V1_TOKEN}" != null
      - docker run -d --name "${TEST_APP}" --network "${TEST_NETWORK}" -e HASNA_TODOS_DATABASE_URL="${TEST_DSN}" -e HASNA_TODOS_API_SIGNING_KEY="${SIGNING_MATERIAL}" -e PGSSLROOTCERT=/tls/ca.crt -e NODE_EXTRA_CA_CERTS=/tls/ca.crt -v /tmp/todos-tls:/tls:ro "${IMAGE}"
      - for i in $(seq 1 60); do docker exec "${TEST_APP}" bun -e 'const r=await fetch("http://127.0.0.1:19427/ready"); process.exit(r.ok?0:1)' >/dev/null 2>&1 && break; sleep 1; done
      - docker run --rm --network "${TEST_NETWORK}" -e TODOS_V1_BASE_URL=http://"${TEST_APP}":19427 --env TODOS_V1_TOKEN -e TODOS_EXPECTED_VERSION="${TODOS_PACKAGE_VERSION}" -v "$PWD/scripts/container-http-smoke.ts:/tmp/container-http-smoke.ts:ro" -v "$PWD/scripts/semver.ts:/tmp/semver.ts:ro" --entrypoint bun "${IMAGE}" /tmp/container-http-smoke.ts
      - docker logs "${TEST_APP}" 2>&1 | tail -200
      - unset TODOS_V1_TOKEN KEY_JSON SIGNING_MATERIAL DB_CREDENTIAL POSTGRES_PASSWORD TEST_DSN
      - docker push "${IMAGE}"
      - export BUILD_SUCCEEDED=1
  post_build:
    commands:
      - |-
        set -euo pipefail
        if docker inspect "${TEST_APP:-missing}" >/dev/null 2>&1; then
          docker logs "${TEST_APP}" 2>&1 | tail -200 | sed -E 's#(postgres(ql)?://)[^@[:space:]]+@#\1[redacted]@#g' || true
        fi
        docker rm -f "${TEST_APP:-missing}" "${TEST_DB:-missing}" >/dev/null 2>&1 || true
        docker network rm "${TEST_NETWORK:-missing}" >/dev/null 2>&1 || true
        if [ "${BUILD_SUCCEEDED:-0}" != 1 ]; then
          echo 'candidate post-build evidence skipped: build did not reach push'
          exit 0
        fi
        REPOSITORY="${ECR_REPOSITORY}"
        IMAGE_DIGEST=$(aws ecr describe-images --region "${AWS_REGION}" --repository-name "${ECR_REPOSITORY_NAME}" --image-ids imageTag="${IMAGE_TAG}" --query 'imageDetails[0].imageDigest' --output text)
        cp /tmp/source-tree.manifest container-source-tree.manifest
        SOURCE_TREE_SHA256=$(sha256sum container-source-tree.manifest | cut -d ' ' -f 1)
        test "${SOURCE_TREE_SHA256}" = "${EXPECTED_SOURCE_TREE_SHA256}"
        jq -n --arg source_sha "${SOURCE_SHA}" --arg archive_sha256 "${SOURCE_ARCHIVE_SHA256:-unknown}" --arg source_tree_sha256 "${SOURCE_TREE_SHA256}" --arg base_manifest_digest 'sha256:3c9ab1a521c82144dff537125695017a0480d3a13088fba7e012cfae0f63146f' --arg base_archive_sha256 "${BASE_IMAGE_ARCHIVE_SHA256}" --arg base_archive_version "${BASE_IMAGE_ARCHIVE_VERSION}" --arg build_id "${CODEBUILD_BUILD_ID}" --arg image_tag "${IMAGE_TAG}" --arg image_digest "${IMAGE_DIGEST}" '{source_sha:$source_sha,source_archive_sha256:$archive_sha256,source_tree_sha256:$source_tree_sha256,base_manifest_digest:$base_manifest_digest,base_archive_sha256:$base_archive_sha256,base_archive_version:$base_archive_version,codebuild_build_id:$build_id,image_tag:$image_tag,image_digest:$image_digest,platform:"linux/arm64",builder:"codebuild"}' > container-provenance.json
        sha256sum container-source-tree.manifest container-apk-inventory.txt container-oci-inspect.json container-sbom.cdx.json container-vulnerability-report.json container-grype-db-status.json container-provenance.json
        /tmp/oras attach --distribution-spec v1.1-referrers-api --artifact-type application/vnd.hasna.todos.build-evidence.v1 --annotation "org.opencontainers.image.revision=${SOURCE_SHA}" --annotation "org.opencontainers.image.subject=${IMAGE_DIGEST}" --export-manifest container-evidence-manifest.json --format json "${REPOSITORY}@${IMAGE_DIGEST}" container-source-tree.manifest:application/octet-stream container-apk-inventory.txt:text/plain container-oci-inspect.json:application/json container-sbom.cdx.json:application/vnd.cyclonedx+json container-vulnerability-report.json:application/vnd.anchore.grype+json container-grype-db-status.json:application/vnd.anchore.grype.db-status+json container-provenance.json:application/vnd.hasna.todos.provenance.v1+json > container-evidence-push.json
        EVIDENCE_DIGEST=$(jq -r '.digest' container-evidence-push.json)
        test "${EVIDENCE_DIGEST}" != null
        test "${EVIDENCE_DIGEST}" != ""
        /tmp/oras discover --distribution-spec v1.1-referrers-api --artifact-type application/vnd.hasna.todos.build-evidence.v1 --format json "${REPOSITORY}@${IMAGE_DIGEST}" > container-referrers.json
        jq -e --arg digest "${EVIDENCE_DIGEST}" '.referrers[] | select(.digest == $digest and .artifactType == "application/vnd.hasna.todos.build-evidence.v1")' container-referrers.json >/dev/null
        sha256sum container-evidence-manifest.json container-referrers.json
        printf 'IMAGE_REF %s@%s\n' "${REPOSITORY}" "${IMAGE_DIGEST}"
        printf 'EVIDENCE_REF %s@%s\n' "${REPOSITORY}" "${EVIDENCE_DIGEST}"
